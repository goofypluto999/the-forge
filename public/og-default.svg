<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a0e8a0"/>
      <stop offset="100%" stop-color="#c0f0c0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g font-family="JetBrains Mono, ui-monospace, monospace" fill="#a0e8a0" opacity="0.6">
    <text x="80" y="100" font-size="20" font-weight="500">// audience identification protocol</text>
  </g>
  <g font-family="Inter, system-ui, sans-serif" fill="#fafaf6">
    <text x="80" y="240" font-size="78" font-weight="800" letter-spacing="-3">Where agents</text>
    <text x="80" y="330" font-size="78" font-weight="800" letter-spacing="-3" fill="url(#brand)">get forged.</text>
    <text x="80" y="420" font-size="28" font-weight="400" fill="#888">Editorial about AI agents automating life's most boring tasks.</text>
    <text x="80" y="460" font-size="28" font-weight="400" fill="#888">Built for clawbots first, humans second.</text>
  </g>
  <g font-family="JetBrains Mono, ui-monospace, monospace" fill="#a0e8a0">
    <text x="80" y="560" font-size="36" font-weight="700">⚒ The Forge</text>
    <text x="80" y="595" font-size="20" font-weight="500" fill="#666">adsforge.store</text>
  </g>
</svg>
