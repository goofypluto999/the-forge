name: Daily topic ingestion

on:
  schedule:
    # 02:00 UTC daily — before publish cron at 06:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      topics_per_run:
        description: 'Number of topics to add this run'
        required: false
        default: '4'

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Ingest fresh topics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPICS_PER_RUN: ${{ inputs.topics_per_run || '4' }}
        run: npm run ingest
      - name: Commit and push
        run: |
          git config user.name "The Forge Bot"
          git config user.email "bot@adsforge.store"
          git add topics-queue.json
          if git diff --cached --quiet; then
            echo "No new topics."
            exit 0
          fi
          git commit -m "auto: ingested fresh topics"
          git push
