name: IndexNow ping after publish

# Pings IndexNow endpoints (Bing, Yandex) whenever the daily-publish
# workflow commits new posts. Accelerates indexing for the new content.

on:
  workflow_run:
    workflows: ["Daily auto-publish"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Ping IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npm run indexnow
